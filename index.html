<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>קניות סופר</title>
<meta name="theme-color" content="#4a9b8e">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234a9b8e'/><text y='.9em' font-size='75' x='12'>🛒</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
:root{--bg:#f0f4f8;--surf:#fff;--surf2:#f8fafc;--pri:#4a9b8e;--pril:#e0f2ef;--prid:#357a6e;--acc:#f97f6a;--txt:#2d3748;--muted:#718096;--brd:#e2e8f0;--chk:#a0aec0;--shd:0 2px 12px rgba(74,155,142,0.10);--r:16px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
.hdr{background:linear-gradient(135deg,#4a9b8e,#5bb8aa);color:#fff;padding:16px 14px 12px;padding-top:calc(16px + env(safe-area-inset-top));position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(74,155,142,0.25);}
.hdr-top{display:-webkit-box;display:flex;-webkit-box-pack:justify;justify-content:space-between;-webkit-box-align:center;align-items:center;margin-bottom:10px;}
.hdr h1{font-size:1.3rem;font-weight:700;}
.counter{background:rgba(255,255,255,0.25);border-radius:20px;padding:4px 12px;font-size:0.82rem;font-weight:600;}
.srch{background:rgba(255,255,255,0.2);border-radius:var(--rs);display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;padding:0 10px;gap:6px;}
.srch input{background:none;border:none;outline:none;color:#fff;font-family:'Heebo',sans-serif;font-size:0.9rem;-webkit-box-flex:1;flex:1;padding:8px 0;}
.srch input::-webkit-input-placeholder{color:rgba(255,255,255,0.7);}
.srch input::placeholder{color:rgba(255,255,255,0.7);}
.srch-x{background:rgba(255,255,255,0.3);border:none;color:#fff;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:0.75rem;font-weight:700;-webkit-box-flex:0;flex-shrink:0;display:none;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;}
.srch-x.on{display:-webkit-box;display:flex;}
.abar{display:-webkit-box;display:flex;gap:7px;padding:10px 12px 7px;background:var(--surf);border-bottom:1px solid var(--brd);-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.btn{border:none;border-radius:20px;padding:7px 13px;font-family:'Heebo',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{opacity:0.8;}
.bp{background:var(--pri);color:#fff;}
.bo{background:#fff;color:var(--pri);border:1.5px solid var(--pri);}
.bd{background:#fff;color:var(--acc);border:1.5px solid var(--acc);}
.bn{background:var(--bg);color:var(--muted);}
.bc{background:var(--bg);color:var(--muted);-webkit-box-flex:1;flex:1;-webkit-box-pack:center;justify-content:center;padding:11px;}
.bs{background:var(--pri);color:#fff;-webkit-box-flex:1;flex:1;-webkit-box-pack:center;justify-content:center;padding:11px;}
.ftabs{display:-webkit-box;display:flex;gap:8px;padding:9px 12px 7px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;background:var(--surf);border-bottom:2px solid var(--brd);}
.ftabs::-webkit-scrollbar{display:none;}
.tab{border:none;border-radius:18px;padding:7px 18px;font-family:'Heebo',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--bg);color:var(--muted);}
.tab.on{background:var(--pri);color:#fff;}
.cont{padding:10px 12px 90px;}
.dsec{margin-bottom:16px;}
.dhdr{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:10px;margin-bottom:7px;padding:8px 12px;background:var(--surf);border-radius:var(--rs);box-shadow:var(--shd);cursor:pointer;-webkit-user-select:none;user-select:none;}
.dic{font-size:1.15rem;}
.dnm{font-size:0.92rem;font-weight:700;-webkit-box-flex:1;flex:1;}
.dcnt{font-size:0.72rem;background:var(--pril);color:var(--prid);border-radius:12px;padding:2px 8px;font-weight:600;}
.dtgl{font-size:0.78rem;color:var(--muted);}
.ditms{display:-webkit-box;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;flex-direction:column;gap:6px;}
.ditms.hid{display:none;}
.item{background:var(--surf);border-radius:var(--rs);padding:10px 12px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:8px;box-shadow:var(--shd);border-right:3px solid transparent;}
.item.chk{opacity:0.55;background:var(--surf2);border-right-color:#c6f6d5;}
.item.chk .inm{text-decoration:line-through;color:var(--chk);}
.icb{width:28px;height:28px;border-radius:50%;border:2px solid var(--brd);background:#fff;cursor:pointer;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-box-flex:0;flex-shrink:0;font-size:0.85rem;}
.icb.chk{background:#68d391;border-color:#68d391;color:#fff;}
.ibdy{-webkit-box-flex:1;flex:1;min-width:0;cursor:pointer;}
.inm{font-size:0.92rem;font-weight:500;}
.inote{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.iqty{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:4px;background:var(--bg);border-radius:18px;padding:3px 6px;}
.qb{width:26px;height:26px;border:none;border-radius:50%;background:var(--pril);color:var(--prid);font-size:1rem;cursor:pointer;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-weight:700;}
.qb:active{background:var(--pri);color:#fff;}
.qn{font-size:0.88rem;font-weight:600;min-width:18px;text-align:center;}
.iedt{width:28px;height:28px;border:none;background:none;color:var(--pri);font-size:0.95rem;cursor:pointer;border-radius:50%;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-box-flex:0;flex-shrink:0;}
.idel{width:28px;height:28px;border:none;background:none;color:#fc8181;font-size:1rem;cursor:pointer;border-radius:50%;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-box-flex:0;flex-shrink:0;}
.aform{background:var(--surf);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--shd);border:1.5px solid var(--pril);display:none;}
.aform.on{display:block;}
.atit{font-size:0.88rem;font-weight:700;color:var(--prid);margin-bottom:11px;}
.frow{display:-webkit-box;display:flex;gap:8px;margin-bottom:8px;}
.fi{-webkit-box-flex:1;flex:1;border:1.5px solid var(--brd);border-radius:var(--rs);padding:9px 12px;font-family:'Heebo',sans-serif;font-size:0.88rem;background:var(--bg);outline:none;text-align:right;}
.fi:focus{border-color:var(--pri);background:#fff;}
.fs{-webkit-box-flex:1;flex:1;border:1.5px solid var(--brd);border-radius:var(--rs);padding:9px 12px;font-family:'Heebo',sans-serif;font-size:0.85rem;background:var(--bg);outline:none;direction:rtl;cursor:pointer;}
.dmgr{background:var(--surf);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--shd);display:none;}
.dmgr.on{display:block;}
.dhint{font-size:0.75rem;color:var(--muted);margin-bottom:8px;text-align:center;}
.dlist{display:-webkit-box;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;flex-direction:column;gap:6px;margin-bottom:10px;}
.dmi{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:8px;background:var(--bg);border-radius:var(--rs);padding:8px 12px;font-size:0.85rem;cursor:grab;-webkit-user-select:none;user-select:none;}
.dmi.drag{opacity:0.55;background:var(--pril);}
.dmi.over{border:2px dashed var(--pri);background:var(--pril);}
.dgh{color:var(--muted);font-size:1.1rem;-webkit-box-flex:0;flex-shrink:0;}
.dmi span{-webkit-box-flex:1;flex:1;}
.dme{border:none;background:none;color:var(--pri);cursor:pointer;font-size:0.9rem;padding:2px 5px;border-radius:6px;}
.dmsv{border:none;background:var(--pri);color:#fff;cursor:pointer;font-size:0.78rem;padding:4px 10px;border-radius:12px;font-family:'Heebo',sans-serif;font-weight:600;}
.dmd{border:none;background:none;color:#fc8181;cursor:pointer;font-size:0.9rem;padding:2px 5px;border-radius:6px;}
.epk{width:42px;height:42px;border:1.5px solid var(--brd);border-radius:var(--rs);background:var(--bg);font-size:1.35rem;cursor:pointer;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;-webkit-box-flex:0;flex-shrink:0;}
.epkr{position:absolute;top:48px;right:0;background:#fff;border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,0.15);padding:10px;z-index:500;display:none;width:260px;}
.epkr.on{display:block;}
.egrd{display:-webkit-box;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:4px;}
.eopt{border:none;background:none;font-size:1.3rem;cursor:pointer;padding:4px;border-radius:8px;}
.eopt:active,.eopt:hover{background:var(--pril);}
.empty{text-align:center;padding:40px 18px;color:var(--muted);}
.empty .ei{font-size:3rem;margin-bottom:10px;}
.bbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--brd);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:justify;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,0.07);z-index:99;}
.stats{display:-webkit-box;display:flex;gap:14px;}
.si{text-align:center;}
.sn{font-size:1.2rem;font-weight:700;color:var(--pri);display:block;line-height:1;}
.sl{font-size:0.62rem;color:var(--muted);font-weight:500;}
.si.rem .sn{color:var(--acc);}
.fab{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--pri),#5bb8aa);border:none;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(74,155,142,0.4);display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;}
.fab:active{opacity:0.85;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:none;-webkit-box-align:end;align-items:flex-end;-webkit-box-pack:center;justify-content:center;}
.mov.on{display:-webkit-box;display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom));width:100%;}
.mhdl{width:40px;height:4px;background:var(--brd);border-radius:2px;margin:0 auto 16px;}
.mtit{font-size:1rem;font-weight:700;margin-bottom:14px;text-align:center;color:var(--prid);}
.mrow{display:-webkit-box;display:flex;gap:8px;margin-bottom:10px;}
.mact{display:-webkit-box;display:flex;gap:8px;margin-top:14px;}
.toast{position:fixed;bottom:80px;left:50%;-webkit-transform:translateX(-50%) translateY(20px);transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;padding:10px 18px;border-radius:24px;font-size:0.82rem;font-weight:500;z-index:999;opacity:0;-webkit-transition:all 0.3s;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <h1>🛒 קניות סופר</h1>
    <div class="counter" id="hdrRem">0 נותרו</div>
  </div>
  <div class="srch">
    <span>🔍</span>
    <input type="text" id="srchInp" placeholder="חפשי מוצר..." oninput="onSrch()">
    <button class="srch-x" id="srchX" onclick="clrSrch()">✕</button>
  </div>
</div>

<div class="abar">
  <button class="btn bd" onclick="clrChk()">🗑️ נקי סימונים</button>
  <button class="btn bo" onclick="setF('remaining')">⏳ מה נותר</button>
  <button class="btn bn" onclick="togDM()">⚙️ מחלקות</button>
  <button class="btn bn" onclick="clrAll()">🔄 אפס הכל</button>
</div>

<div class="ftabs">
  <button class="tab on" id="tab-all" onclick="setF('all')">הכל</button>
  <button class="tab" id="tab-remaining" onclick="setF('remaining')">נותר</button>
  <button class="tab" id="tab-checked" onclick="setF('checked')">✅ נקנה</button>
</div>

<div class="cont">
  <div class="dmgr" id="deptMgr">
    <div class="atit">⚙️ ניהול מחלקות</div>
    <div class="dhint">☰ גרורי מחלקה לשינוי סדר</div>
    <div class="dlist" id="dList"></div>
    <div class="frow" style="position:relative;-webkit-box-align:center;align-items:center;">
      <div style="position:relative;-webkit-box-flex:0;flex-shrink:0;">
        <button class="epk" id="epkBtn" onclick="togEP(event)">🛒</button>
        <div class="epkr" id="epkr"><div class="egrd" id="egrd"></div></div>
      </div>
      <input type="text" id="ndName" class="fi" placeholder="שם מחלקה חדשה">
      <button class="btn bp" onclick="addDept()">הוסיפי</button>
    </div>
  </div>

  <div class="aform" id="addForm">
    <div class="atit">➕ הוספת מוצר</div>
    <div class="frow">
      <input type="text" id="niName" class="fi" placeholder="שם המוצר">
      <select id="niDept" class="fs"></select>
    </div>
    <div class="frow">
      <input type="text" id="niNote" class="fi" placeholder="הערה (לא חובה)">
      <select id="niQty" class="fs" style="max-width:75px;">
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>10</option>
      </select>
      <button class="btn bp" onclick="addItem()">הוסיפי</button>
    </div>
  </div>

  <div id="listCont"></div>
</div>

<div class="bbar">
  <div class="stats">
    <div class="si"><span class="sn" id="stTotal">0</span><span class="sl">סה"כ</span></div>
    <div class="si rem"><span class="sn" id="stRem">0</span><span class="sl">נותרו</span></div>
    <div class="si"><span class="sn" id="stChk">0</span><span class="sl">בסל 🛒</span></div>
  </div>
  <button class="fab" id="fabBtn" onclick="togAF()">➕</button>
</div>

<div class="mov" id="editMov" onclick="clsEdit(event)">
  <div class="modal">
    <div class="mhdl"></div>
    <div class="mtit">✏️ עריכת מוצר</div>
    <input type="hidden" id="eid">
    <div class="mrow"><input type="text" id="eName" class="fi" placeholder="שם המוצר"></div>
    <div class="mrow"><select id="eDept" class="fs"></select></div>
    <div class="mrow">
      <input type="text" id="eNote" class="fi" placeholder="הערה (לא חובה)">
      <select id="eQty" class="fs" style="max-width:75px;">
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>10</option>
      </select>
    </div>
    <div class="mact">
      <button class="btn bc" onclick="clsEdit()">ביטול</button>
      <button class="btn bs" onclick="savEdit()">💾 שמרי</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var DD=[
  {id:'produce',name:'ירקות ופירות',icon:'🥦'},
  {id:'dairy',name:'חלב וגבינות',icon:'🧀'},
  {id:'meat',name:'בשר ועוף',icon:'🥩'},
  {id:'bakery',name:'לחם ומאפים',icon:'🍞'},
  {id:'frozen',name:'קפואים',icon:'🧊'},
  {id:'grocery',name:'מזון יבש',icon:'🥫'},
  {id:'beverages',name:'שתייה',icon:'🧃'},
  {id:'snacks',name:'חטיפים וממתקים',icon:'🍫'},
  {id:'cleaning',name:'ניקיון',icon:'🧹'},
  {id:'hygiene',name:'היגיינה ויופי',icon:'🧴'},
  {id:'baby',name:'תינוקות',icon:'🍼'},
  {id:'other',name:'שונות',icon:'🛒'}
];
var EMOJIS='🥦🥕🍅🍎🍋🥑🌽🧄🧀🥛🍳🥚🧈🥩🍗🌭🥓🍖🍞🥐🥖🧁🍰🧊🫙🥫🍝🍜🫘🌾🧂🧃🥤🍵☕🧋🍫🍬🍭🍿🍪🧹🧺🧻🪣🧴🪥🧼💊🩺🍼🧸🛒📦🏠🐾📱💻🎵⭐'.split('');

var depts=JSON.parse(localStorage.getItem('sm_d')||'null')||DD;
var items=JSON.parse(localStorage.getItem('sm_i')||'[]');
var coll=JSON.parse(localStorage.getItem('sm_c')||'{}');
var flt='all';

function sv(){
  localStorage.setItem('sm_d',JSON.stringify(depts));
  localStorage.setItem('sm_i',JSON.stringify(items));
  localStorage.setItem('sm_c',JSON.stringify(coll));
  if(document.getElementById('addForm').className.indexOf('on')>-1) fillDS();
}

function setF(f){
  flt=f;
  var tabs=['all','remaining','checked'];
  for(var i=0;i<tabs.length;i++){
    var el=document.getElementById('tab-'+tabs[i]);
    if(el) el.className='tab'+(tabs[i]===f?' on':'');
  }
  render();
}

function onSrch(){
  var v=document.getElementById('srchInp').value;
  var x=document.getElementById('srchX');
  x.className='srch-x'+(v.length>0?' on':'');
  render();
}
function clrSrch(){
  document.getElementById('srchInp').value='';
  document.getElementById('srchX').className='srch-x';
  render();
  document.getElementById('srchInp').focus();
}

function render(){
  var srch=document.getElementById('srchInp').value.trim().toLowerCase();
  var c=document.getElementById('listCont');
  var fil=[];
  for(var i=0;i<items.length;i++){
    var it=items[i];
    if(flt==='remaining'&&it.chk) continue;
    if(flt==='checked'&&!it.chk) continue;
    if(srch&&it.name.toLowerCase().indexOf(srch)<0&&(it.note||'').toLowerCase().indexOf(srch)<0) continue;
    fil.push(it);
  }
  if(!fil.length){
    var em={all:['📋','הרשימה ריקה — לחצי ➕'],remaining:['✅','כל המוצרים נקנו!'],checked:['🛒','עדיין לא נקנה כלום']};
    c.innerHTML='<div class="empty"><div class="ei">'+em[flt][0]+'</div><p>'+em[flt][1]+'</p></div>';
    updStats();return;
  }
  var grp={};
  for(var i=0;i<depts.length;i++) grp[depts[i].id]=[];
  for(var i=0;i<fil.length;i++){
    var it=fil[i];
    if(!grp[it.dept]) grp[it.dept]=[];
    grp[it.dept].push(it);
  }
  var html='';
  for(var i=0;i<depts.length;i++){
    var d=depts[i];
    var di=grp[d.id]||[];
    if(!di.length) continue;
    var col=coll[d.id];
    html+='<div class="dsec"><div class="dhdr" onclick="togD(\''+d.id+'\')">';
    html+='<span class="dic">'+d.icon+'</span>';
    html+='<span class="dnm">'+d.name+'</span>';
    html+='<span class="dcnt">'+di.length+'</span>';
    html+='<span class="dtgl">'+(col?'◀':'▼')+'</span></div>';
    html+='<div class="ditms'+(col?' hid':'')+'">';
    for(var j=0;j<di.length;j++) html+=rItem(di[j]);
    html+='</div></div>';
  }
  c.innerHTML=html;
  updStats();
}

function rItem(it){
  var h='<div class="item'+(it.chk?' chk':'')+'" id="i_'+it.id+'">';
  h+='<div class="icb'+(it.chk?' chk':'')+'" onclick="togI(\''+it.id+'\')">'+(it.chk?'✓':'')+'</div>';
  h+='<div class="ibdy" onclick="togI(\''+it.id+'\')">';
  h+='<div class="inm">'+it.name+'</div>';
  if(it.note) h+='<div class="inote">📝 '+it.note+'</div>';
  h+='</div>';
  h+='<div class="iqty">';
  h+='<button class="qb" onclick="chgQ(\''+it.id+'\',-1)">−</button>';
  h+='<span class="qn">'+it.qty+'</span>';
  h+='<button class="qb" onclick="chgQ(\''+it.id+'\',1)">+</button>';
  h+='</div>';
  h+='<button class="iedt" onclick="opnE(\''+it.id+'\')" style="font-size:1rem;">✏️</button>';
  h+='<button class="idel" onclick="delI(\''+it.id+'\')" style="font-size:0.95rem;">✕</button>';
  h+='</div>';
  return h;
}

function updStats(){
  var tot=items.length,chk=0;
  for(var i=0;i<items.length;i++) if(items[i].chk) chk++;
  var rem=tot-chk;
  document.getElementById('stTotal').innerHTML=tot;
  document.getElementById('stChk').innerHTML=chk;
  document.getElementById('stRem').innerHTML=rem;
  document.getElementById('hdrRem').innerHTML=rem+' נותרו';
}

function togI(id){for(var i=0;i<items.length;i++) if(items[i].id===id){items[i].chk=!items[i].chk;sv();render();return;}}
function chgQ(id,d){for(var i=0;i<items.length;i++) if(items[i].id===id){items[i].qty=Math.max(1,items[i].qty+d);sv();render();return;}}
function delI(id){var ni=[];for(var i=0;i<items.length;i++) if(items[i].id!==id) ni.push(items[i]);items=ni;sv();render();toast('🗑️ מוצר נמחק');}

function addItem(){
  var nm=document.getElementById('niName').value.trim();
  if(!nm){toast('⚠️ הכניסי שם מוצר');return;}
  items.push({id:Date.now()+'',name:nm,dept:document.getElementById('niDept').value,note:document.getElementById('niNote').value.trim(),qty:parseInt(document.getElementById('niQty').value),chk:false});
  sv();render();
  document.getElementById('niName').value='';
  document.getElementById('niNote').value='';
  document.getElementById('niQty').value='1';
  document.getElementById('niName').focus();
  toast('✅ '+nm+' נוסף!');
}

function opnE(id){
  var it=null;for(var i=0;i<items.length;i++) if(items[i].id===id){it=items[i];break;}
  if(!it) return;
  var ds='';for(var i=0;i<depts.length;i++) ds+='<option value="'+depts[i].id+'"'+(depts[i].id===it.dept?' selected':'')+'>'+depts[i].icon+' '+depts[i].name+'</option>';
  document.getElementById('eDept').innerHTML=ds;
  var qs='';var qo=[1,2,3,4,5,6,10];for(var i=0;i<qo.length;i++) qs+='<option'+(qo[i]===it.qty?' selected':'')+'>'+qo[i]+'</option>';
  document.getElementById('eQty').innerHTML=qs;
  document.getElementById('eid').value=id;
  document.getElementById('eName').value=it.name;
  document.getElementById('eNote').value=it.note||'';
  document.getElementById('editMov').className='mov on';
  setTimeout(function(){document.getElementById('eName').focus();},200);
}
function clsEdit(e){if(!e||e.target===document.getElementById('editMov')) document.getElementById('editMov').className='mov';}
function savEdit(){
  var id=document.getElementById('eid').value;
  var nm=document.getElementById('eName').value.trim();
  if(!nm){toast('⚠️ הכניסי שם');return;}
  for(var i=0;i<items.length;i++) if(items[i].id===id){
    items[i].name=nm;
    items[i].dept=document.getElementById('eDept').value;
    items[i].note=document.getElementById('eNote').value.trim();
    items[i].qty=parseInt(document.getElementById('eQty').value);
    break;
  }
  sv();render();
  document.getElementById('editMov').className='mov';
  toast('✅ המוצר עודכן!');
}

function clrChk(){var cnt=0,ni=[];for(var i=0;i<items.length;i++) if(items[i].chk) cnt++;else ni.push(items[i]);if(!cnt){toast('אין מסומנים');return;}items=ni;sv();render();toast('🗑️ '+cnt+' נוקו');}
function clrAll(){if(!confirm('למחוק את כל הרשימה?')) return;items=[];sv();render();toast('🔄 הרשימה אופסה');}
function togD(id){coll[id]=!coll[id];sv();render();}

function togAF(){
  var f=document.getElementById('addForm');
  var isOn=f.className.indexOf('on')>-1;
  f.className='aform'+(isOn?'':' on');
  if(!isOn){fillDS();setTimeout(function(){document.getElementById('niName').focus();},100);}
}
function togDM(){
  var el=document.getElementById('deptMgr');
  var isOn=el.className.indexOf('on')>-1;
  el.className='dmgr'+(isOn?'':' on');
  if(!isOn) rDM();
}
function fillDS(){
  var s='';for(var i=0;i<depts.length;i++) s+='<option value="'+depts[i].id+'">'+depts[i].icon+' '+depts[i].name+'</option>';
  document.getElementById('niDept').innerHTML=s;
}

// DEPT MANAGER
function rDM(){
  var l=document.getElementById('dList');
  var h='';
  for(var i=0;i<depts.length;i++){
    var d=depts[i];
    h+='<div class="dmi" id="dm_'+d.id+'" data-id="'+d.id+'">';
    h+='<span class="dgh">☰</span>';
    h+='<span id="dml_'+d.id+'">'+d.icon+' '+d.name+'</span>';
    h+='<button class="dme" onclick="stED(\''+d.id+'\')" style="font-size:0.88rem;">✏️</button>';
    h+='<button class="dmd" onclick="delD(\''+d.id+'\')">✕</button>';
    h+='</div>';
  }
  l.innerHTML=h;
  var els=l.querySelectorAll('.dmi');
  for(var i=0;i<els.length;i++) initDrag(els[i]);
}

function stED(id){
  var d=null;for(var i=0;i<depts.length;i++) if(depts[i].id===id){d=depts[i];break;}
  if(!d) return;
  var item=document.getElementById('dm_'+id);
  var lbl=document.getElementById('dml_'+id);
  lbl.outerHTML='<input id="de_e_'+id+'" class="fi" value="'+d.icon+'" style="max-width:48px;text-align:center;padding:5px;"><input id="de_n_'+id+'" class="fi" value="'+d.name+'" style="flex:1;padding:5px;">';
  item.querySelector('.dme').outerHTML='<button class="dmsv" onclick="svED(\''+id+'\')">💾</button>';
  item.setAttribute('draggable','false');
  document.getElementById('de_n_'+id).focus();
}
function svED(id){
  var d=null;for(var i=0;i<depts.length;i++) if(depts[i].id===id){d=depts[i];break;}
  if(!d) return;
  var e=document.getElementById('de_e_'+id);
  var n=document.getElementById('de_n_'+id);
  if(!n||!n.value.trim()){toast('⚠️ הכניסי שם');return;}
  d.icon=e?e.value.trim()||d.icon:d.icon;
  d.name=n.value.trim();
  sv();rDM();render();toast('✅ עודכן!');
}

// DRAG
var dragSrc=null,tdEl=null,tdClone=null,tdOY=0,lpTimer=null,isDrag=false,asTimer=null;
var LPDUR=700,MVLIM=10,SZ=80,SS=6;

function initDrag(el){
  el.addEventListener('touchstart',onTS,{passive:true});
  el.addEventListener('touchmove',onTM,{passive:false});
  el.addEventListener('touchend',onTE);
  el.addEventListener('touchcancel',onTE);
  el.setAttribute('draggable','true');
  el.addEventListener('dragstart',function(){dragSrc=this;this.className='dmi drag';});
  el.addEventListener('dragover',function(e){e.preventDefault();var els=document.querySelectorAll('.dmi');for(var i=0;i<els.length;i++) els[i].className='dmi'+(els[i]===dragSrc?' drag':'');this.className='dmi over';});
  el.addEventListener('drop',function(e){e.preventDefault();if(dragSrc&&dragSrc!==this) reord(dragSrc.dataset.id,this.dataset.id);});
  el.addEventListener('dragend',function(){var els=document.querySelectorAll('.dmi');for(var i=0;i<els.length;i++) els[i].className='dmi';});
}
var tsX=0,tsY=0;
function onTS(e){
  var el=this,t=e.touches[0];
  tsX=t.clientX;tsY=t.clientY;isDrag=false;
  lpTimer=setTimeout(function(){stDrag(el,t);},LPDUR);
}
function stDrag(el,t){
  isDrag=true;tdEl=el;
  if(navigator.vibrate) navigator.vibrate(40);
  var r=el.getBoundingClientRect();
  tdOY=t.clientY-r.top;
  tdClone=el.cloneNode(true);
  tdClone.style.cssText='position:fixed;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;z-index:9999;opacity:0.9;pointer-events:none;border-radius:10px;background:#e0f2ef;box-shadow:0 8px 28px rgba(74,155,142,0.35);';
  document.body.appendChild(tdClone);
  el.className='dmi drag';
}
function onTM(e){
  var t=e.touches[0];
  if(!isDrag){
    if(Math.abs(t.clientX-tsX)>MVLIM||Math.abs(t.clientY-tsY)>MVLIM){clearTimeout(lpTimer);lpTimer=null;}
    return;
  }
  e.preventDefault();
  var y=t.clientY;
  tdClone.style.top=(y-tdOY)+'px';
  tdClone.style.visibility='hidden';
  var u=document.elementFromPoint(t.clientX,y);
  tdClone.style.visibility='';
  var tg=u&&u.closest('.dmi');
  var els=document.querySelectorAll('.dmi');
  for(var i=0;i<els.length;i++) els[i].className='dmi'+(els[i]===tdEl?' drag':'');
  if(tg&&tg!==tdEl) tg.className='dmi over';
  clearInterval(asTimer);
  var vh=window.innerHeight;
  if(y<SZ){asTimer=setInterval(function(){window.scrollBy(0,-SS);tdClone.style.top=(parseFloat(tdClone.style.top)-SS)+'px';},16);}
  else if(y>vh-SZ){asTimer=setInterval(function(){window.scrollBy(0,SS);tdClone.style.top=(parseFloat(tdClone.style.top)+SS)+'px';},16);}
}
function onTE(){
  clearTimeout(lpTimer);lpTimer=null;clearInterval(asTimer);asTimer=null;
  if(!isDrag){isDrag=false;return;}
  isDrag=false;
  if(tdClone){tdClone.remove();tdClone=null;}
  if(tdEl) tdEl.className='dmi';
  var ov=document.querySelector('.dmi.over');
  if(ov&&tdEl&&ov!==tdEl) reord(tdEl.dataset.id,ov.dataset.id);
  var els=document.querySelectorAll('.dmi');
  for(var i=0;i<els.length;i++) els[i].className='dmi';
  tdEl=null;
}
function reord(fid,tid){
  var fi=-1,ti=-1;
  for(var i=0;i<depts.length;i++){if(depts[i].id===fid) fi=i;if(depts[i].id===tid) ti=i;}
  if(fi<0||ti<0) return;
  var m=depts.splice(fi,1)[0];depts.splice(ti,0,m);
  sv();rDM();render();toast('↕️ סדר עודכן');
}

function addDept(){
  var em=document.getElementById('epkBtn').innerHTML.trim()||'🛒';
  var nm=document.getElementById('ndName').value.trim();
  if(!nm){toast('⚠️ הכניסי שם');return;}
  depts.push({id:'d'+Date.now(),name:nm,icon:em});
  sv();rDM();
  document.getElementById('epkBtn').innerHTML='🛒';
  document.getElementById('ndName').value='';
  toast('✅ מחלקה נוספה');
}
function delD(id){
  for(var i=0;i<items.length;i++) if(items[i].dept===id){toast('⚠️ יש פריטים במחלקה');return;}
  var nd=[];for(var i=0;i<depts.length;i++) if(depts[i].id!==id) nd.push(depts[i]);
  depts=nd;sv();rDM();toast('🗑️ נמחקה');
}

// EMOJI PICKER
function initEP(){
  var g=document.getElementById('egrd');
  var h='';
  for(var i=0;i<EMOJIS.length;i++) h+='<button class="eopt" onclick="selE(\''+EMOJIS[i]+'\')">'+EMOJIS[i]+'</button>';
  g.innerHTML=h;
}
function togEP(e){e.stopPropagation();var p=document.getElementById('epkr');p.className='epkr'+(p.className.indexOf('on')>-1?'':' on');}
function selE(em){document.getElementById('epkBtn').innerHTML=em;document.getElementById('epkr').className='epkr';}
document.addEventListener('click',function(){document.getElementById('epkr').className='epkr';});

function toast(msg){
  var t=document.getElementById('toast');t.innerHTML=msg;t.className='toast on';
  setTimeout(function(){t.className='toast';},2200);
}

initEP();render();
</script>
